# Deploy pipeline (A8) — web on Vercel, worker on Fly.io.
#
# On merge to main: apply migrations to the linked Supabase project, run
# advisors + a dependency audit, then deploy the web app (Vercel) and the worker
# (Fly). Every deploy step is gated on its secret, so the workflow is a safe
# no-op until you configure them.
#
# Required repository secrets:
#   Supabase: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD
#   Vercel:   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#             (or skip this job and use Vercel's own Git integration)
#   Fly:      FLY_API_TOKEN   (fly.io deploy token)

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_CONFIGURED: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (non-blocking)
        run: pnpm audit --prod || true

      - name: Setup Supabase CLI
        if: env.SUPABASE_CONFIGURED == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        if: env.SUPABASE_CONFIGURED == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase db push

      - name: Database advisors (lint)
        if: env.SUPABASE_CONFIGURED == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db lint --level warning

      - name: Skipped (Supabase not configured)
        if: env.SUPABASE_CONFIGURED != 'true'
        run: echo "SUPABASE_ACCESS_TOKEN not set — skipping migrate/advisors."

  # Web on Vercel. Skip this job entirely if you connect the repo to Vercel's Git
  # integration instead (Vercel then auto-deploys on push).
  deploy-web:
    needs: migrate
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Deploy apps/web to production
        run: |
          vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  # Worker on Fly.io (apps/worker/Dockerfile + fly.toml).
  deploy-worker:
    needs: migrate
    runs-on: ubuntu-latest
    if: ${{ secrets.FLY_API_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/worker/fly.toml --dockerfile apps/worker/Dockerfile --remote-only
